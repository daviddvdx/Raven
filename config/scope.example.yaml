program: "Example Bug Bounty"
program_name: "Example Bug Bounty"
researcher: "Daviddvdx"
bug_bounty_handle: "your-handle"
allowed_domains:
  - "example.com"
  - "*.example.com"
in_scope_domains:
  - "example.com"
  - "*.example.com"
allowed_urls:
  - "https://www.example.com"
  - "https://api.example.com"
deny:
  - "admin-prod.example.com"
  - "payments.example.com"
out_of_scope_domains:
  - "admin-prod.example.com"
  - "payments.example.com"
allowed_paths:
  - "/"
denied_paths:
  - "/logout"
  - "/delete"
  - "/remove"
  - "/payments"
  - "/admin/destructive"
allowed_schemes:
  - "https"
allowed_methods:
  - "GET"
  - "HEAD"
  - "OPTIONS"
  - "POST"
max_depth: 3
notes: "Authorized testing only. Replace this example with the exact public Bug Bounty scope before scanning."
user_agent_suffix: "your-handle-authorized-research"
rate_limit:
  requests_per_second: 2
  burst: 3
headers:
  User-Agent: "Mozilla/5.0 BugBounty-Research"
  X-Bug-Bounty: "researcher-id"
proxy:
  enabled: false
  url: "http://127.0.0.1:8080"
